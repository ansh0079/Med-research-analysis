# ==========================================
# Development Docker Compose
# Full-stack hot-reload environment
# Usage: docker compose -f docker-compose.dev.yml up
# ==========================================

version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medsearch-pg-dev
    environment:
      POSTGRES_USER: medsearch
      POSTGRES_PASSWORD: medsearch
      POSTGRES_DB: medsearch
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - medsearch_pgdata_dev:/var/lib/postgresql/data
      - ./database/pgvector.schema.sql:/docker-entrypoint-initdb.d/10-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medsearch -d medsearch"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  grobid:
    image: grobid/grobid:0.8.0
    container_name: medsearch-grobid-dev
    ports:
      - "8070:8070"
    environment:
      - GROBID_OPTS=-Xmx2g
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: medsearch-dev
    ports:
      - "${NODE_PORT:-3002}:3002"
      - "${VITE_PORT:-5173}:5173"
    depends_on:
      postgres:
        condition: service_healthy
      grobid:
        condition: service_started
    environment:
      - NODE_ENV=development
      - PORT=3002
      - PG_VECTOR_URL=postgresql://medsearch:medsearch@postgres:5432/medsearch
      - DATABASE_PATH=/app/data/app.db
      - ENABLE_COLLABORATION_API=${ENABLE_COLLABORATION_API:-false}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-me}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - SEMANTIC_SCHOLAR_KEY=${SEMANTIC_SCHOLAR_KEY:-}
      - NCBI_API_KEY=${NCBI_API_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - GROBID_URL=http://grobid:8070
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
      - ./data:/app/data
    restart: unless-stopped
    stdin_open: true
    tty: true
    command: npm run dev

volumes:
  medsearch_pgdata_dev:
