# Fly.io worker — deploy as separate app with same image
# fly apps create medical-research-worker
# fly deploy --config fly.worker.toml

app = "medical-research-worker"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = 10

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  APP_ROLE = "worker"
  WORKER_HEALTH_PORT = "3003"
  DEV_DISABLE_AUTH = "false"
  BETA_MODE = "true"
  PGSSL = "true"
  AUTO_SEED_ON_SEARCH = "false"

[[services]]
  internal_port = 3003
  protocol = "tcp"
  processes = ["worker"]

  [[services.ports]]
    handlers = []
    port = 3003

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"

[processes]
  worker = "node server/worker.js"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
