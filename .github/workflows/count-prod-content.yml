name: Count Prod Content

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/count-prod-content.yml'

jobs:
  count:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Count articles referenced in topic knowledge
        uses: appleboy/ssh-action@v1
        with:
          host: 178.105.155.246
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 3m
          script: |
            set -e
            echo '=== source_articles PMIDs in topic_knowledge ==='
            docker exec medsearch-pg psql -U medsearch -d medsearch -c "SELECT COUNT(*) AS topics_with_sources, COALESCE(SUM(jsonb_array_length(source_articles::jsonb)),0) AS source_article_refs FROM topic_knowledge WHERE source_articles IS NOT NULL AND source_articles <> '' AND source_articles <> '[]';"
            echo '=== unique external ids in source_articles ==='
            docker exec medsearch-pg psql -U medsearch -d medsearch -c "SELECT COUNT(DISTINCT elem) AS unique_source_refs FROM topic_knowledge, LATERAL jsonb_array_elements_text(CASE WHEN source_articles ~ '^\\[' THEN source_articles::jsonb ELSE '[]'::jsonb END) AS elem;"
            echo '=== teaching claims / papers if present ==='
            docker exec medsearch-pg psql -U medsearch -d medsearch -c "SELECT relname FROM pg_class WHERE relkind='r' AND relname ILIKE '%article%' OR relname ILIKE '%paper%' OR relname ILIKE '%pmid%' ORDER BY 1;"
