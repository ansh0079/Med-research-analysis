name: Count Prod Content

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/count-prod-content.yml'

jobs:
  count:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Count topics, guidelines, articles on Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: 178.105.155.246
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 3m
          script: |
            set -e
            echo '=== topic_knowledge ==='
            docker exec medsearch-pg psql -U medsearch -d medsearch -c "SELECT COUNT(*) AS topic_knowledge FROM topic_knowledge;"
            echo '=== topic_guidelines ==='
            docker exec medsearch-pg psql -U medsearch -d medsearch -c "SELECT COUNT(*) AS guidelines, COUNT(DISTINCT source_body) AS source_bodies, COUNT(DISTINCT normalized_topic) AS guideline_topics FROM topic_guidelines;"
            echo '=== curriculum ==='
            docker exec medsearch-pg psql -U medsearch -d medsearch -c "SELECT (SELECT COUNT(*) FROM curriculum_topics) AS curriculum_topics, (SELECT COUNT(*) FROM curriculum_blocks) AS curriculum_blocks;"
            echo '=== articles_cache ==='
            docker exec medsearch-pg psql -U medsearch -d medsearch -c "SELECT COUNT(*) AS articles_cache FROM articles_cache;"
            echo '=== articles_cache by source ==='
            docker exec medsearch-pg psql -U medsearch -d medsearch -c "SELECT source, COUNT(*) FROM articles_cache GROUP BY 1 ORDER BY 2 DESC;"
            echo '=== saved_articles / searches ==='
            docker exec medsearch-pg psql -U medsearch -d medsearch -c "SELECT (SELECT COUNT(*) FROM saved_articles) AS saved_articles, (SELECT COUNT(*) FROM searches) AS searches;"
            echo '=== flagship config on host ==='
            node -e 'const c=require("/opt/medsearch/server/config/flagshipTopics.json"); console.log("flagshipTopics", c.topics.length, "version", c.version);'
