name: PR Guardrails

on:
  pull_request:

permissions:
  contents: read

jobs:
  guardrails:
    name: Test, Typecheck, Lint, Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run search pipeline unit tests
        run: npm test -- --testPathPatterns="searchPipeline.test|unifiedEvidenceSearch.test|searchEvidenceMergeService.test|searchPersonalizationEval.test|learnerContextService.test|learnerStateService.test|learnerProfileRollupService.test|claimRemediationService.test|agentTurnMemoryService.test|agentPromptTrajectory.test" --no-coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          ADMIN_TOKEN: test-admin-token

      - name: Run search quality unit tests
        run: npm test -- --testPathPatterns="searchQualityEvalService.test|searchQualityRegression.test|searchGoldFixture.test|qualityMetricsService.test" --no-coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          ADMIN_TOKEN: test-admin-token

      - name: Run search personalization eval
        run: npm run eval:search-personalization
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          ADMIN_TOKEN: test-admin-token

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          ADMIN_TOKEN: test-admin-token

      - name: Run TypeScript (client + server)
        run: npm run typecheck:all

      - name: Run ESLint
        run: npm run lint

      - name: Generate and validate OpenAPI
        run: |
          npm run docs:openapi:generate
          npm run docs:openapi:validate

      - name: Verify production env checklist
        run: npm run verify:production-env
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-jwt-secret-at-least-thirty-two-characters-long
          CORS_ORIGINS: http://localhost:3002
          APP_URL: https://localhost:3002
          SMTP_FROM: noreply@example.com
          RESEND_API_KEY: test-resend-key
          GEMINI_API_KEY: test-gemini-key
          SENTRY_DSN: https://test@sentry.example.com/1
          PAYWALL_ENABLED: true
          STRIPE_SECRET_KEY: sk_test_xxx
          STRIPE_WEBHOOK_SECRET: whsec_xxx
          STRIPE_RESEARCHER_PRICE_ID: price_xxx
          STRIPE_PRO_PRICE_ID: price_xxx
          STRIPE_TEAM_PRICE_ID: price_xxx

      - name: Build frontend for E2E
        run: npm run build

      - name: Run fast E2E tests
        run: |
          NODE_ENV=e2e JWT_SECRET=test-jwt-secret ADMIN_TOKEN=test-admin-token npm start &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..30}; do
            curl -sf http://localhost:3002/health && break
            sleep 1
          done
          npm run test:e2e:ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  # Offline gates always block: gold fixture ↔ landmark alias coverage + baseline contracts.
  search-quality-offline-gate:
    name: Search Quality Offline Gate
    runs-on: ubuntu-latest
    needs: guardrails
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run offline search-quality CI gates
        run: npm run test:search-quality-gate
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          ADMIN_TOKEN: test-admin-token

      - name: Run offline IPS / linear-value unit gates
        run: npm run test:offline-policy
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          ADMIN_TOKEN: test-admin-token

      - name: Service boundary + platform hardening gates
        run: |
          npm run check:service-boundaries
          npm run test:platform-hardening
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          ADMIN_TOKEN: test-admin-token

  # Live labelled eval reports visibly. Continues on error so PubMed/OpenAlex flakiness
  # does not block merge; offline gate above is the merge gate when fixtures change.
  search-quality-eval:
    name: Labelled Search Quality Eval
    runs-on: ubuntu-latest
    needs: guardrails
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run labelled search quality eval
        run: |
          NODE_ENV=test APP_ROLE=web JWT_SECRET=test-jwt-secret ADMIN_TOKEN=test-admin-token npm start &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..30}; do
            curl -sf http://localhost:3002/health && break
            sleep 1
          done
          npm run eval:search-quality:gold
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          ADMIN_TOKEN: test-admin-token

      - name: Upload search quality eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-quality-eval-${{ github.run_id }}
          path: eval-results/search-quality-gold-*.json
          if-no-files-found: ignore
