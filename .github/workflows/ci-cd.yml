name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

# ──────────────────────────────────────────────
# Job 1: Lint
# ──────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: ESLint
        run: npx eslint . --quiet
      - name: TypeScript type-check
        run: npm run typecheck:all

# ──────────────────────────────────────────────
# Job 2: Unit + API tests (with coverage)
# ──────────────────────────────────────────────
  unit-tests:
    name: Unit & API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Legacy surface freeze (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          node tools/check-legacy-freeze.js "origin/${{ github.base_ref }}" "HEAD"
      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          ADMIN_TOKEN: test-admin-token
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

# ──────────────────────────────────────────────
# Job 3: DB integration tests (Postgres + Redis)
# ──────────────────────────────────────────────
  integration-tests:
    name: Postgres & Redis Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run backend tests against Postgres + Redis
        run: npm test -- --testPathPatterns="DatabaseCore|db\\.integration|redisClient" --coverage=false
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          PG_VECTOR_URL: postgresql://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-jwt-secret-at-least-thirty-two-characters-long
          ADMIN_TOKEN: test-admin-token

# ──────────────────────────────────────────────
# Job 4: Security audit
# ──────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm audit --omit dev --audit-level=moderate

# ──────────────────────────────────────────────
# Job 4: Build (verifies Vite + tsc produce clean output)
# ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

# ──────────────────────────────────────────────
# Job 5: OpenAPI spec verification
# ──────────────────────────────────────────────
  openapi-verify:
    name: OpenAPI Verify
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Generate OpenAPI spec
        run: npm run docs:openapi:generate
      - name: Validate OpenAPI spec
        run: npm run docs:openapi:validate
      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/openapi.json
          retention-days: 14

# ──────────────────────────────────────────────
# Job 6: Load test smoke (k6)
# ──────────────────────────────────────────────
  load-test-smoke:
    name: Load Test Smoke
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: Start test server
        run: |
          NODE_ENV=test JWT_SECRET=ci-jwt-secret ADMIN_TOKEN=ci-admin-token npm start &
          for i in {1..30}; do
            curl -sf http://localhost:3002/health && break
            sleep 1
          done
      - name: Run k6 smoke test
        run: npm run test:load:smoke
        env:
          BASE_URL: http://localhost:3002
      - name: Upload k6 report
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-report
          path: tests/load/results/
          retention-days: 7
        if: always()

# ──────────────────────────────────────────────
# Job 7: Docker build + push  (main branch only, all gates must pass)
# ──────────────────────────────────────────────
  release:
    name: Docker Release
    runs-on: ubuntu-latest
    needs: [build, integration-tests, openapi-verify, load-test-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    env:
      BETA_BASE_URL: ${{ secrets.BETA_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Beta safety gate
        run: npm run beta:safety
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/medresearch:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/medresearch:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
