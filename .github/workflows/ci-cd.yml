name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

# ──────────────────────────────────────────────
# Job 1: Lint
# ──────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: ESLint
        run: npx eslint . --quiet
      - name: TypeScript type-check
        run: npm run typecheck

# ──────────────────────────────────────────────
# Job 2: Unit + API tests (with coverage)
# ──────────────────────────────────────────────
  unit-tests:
    name: Unit & API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Legacy surface freeze (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          node tools/check-legacy-freeze.js "origin/${{ github.base_ref }}" "HEAD"
      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          ADMIN_TOKEN: test-admin-token
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

# ──────────────────────────────────────────────
# Job 3: Security audit
# ──────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm audit --omit dev --audit-level=high

# ──────────────────────────────────────────────
# Job 4: Build (verifies Vite + tsc produce clean output)
# ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

# ──────────────────────────────────────────────
# Job 5: OpenAPI spec verification
# ──────────────────────────────────────────────
  openapi-verify:
    name: OpenAPI Verify
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Generate OpenAPI spec
        run: npm run docs:openapi:generate
      - name: Validate OpenAPI spec
        run: npm run docs:openapi:validate
      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/openapi.json
          retention-days: 14

# ──────────────────────────────────────────────
# Job 6: Load test smoke (k6)
# ──────────────────────────────────────────────
  load-test-smoke:
    name: Load Test Smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Install k6
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69 || true
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6 || true
      - name: Start test server
        run: |
          NODE_ENV=test JWT_SECRET=ci-jwt-secret ADMIN_TOKEN=ci-admin-token npm start &
          for i in {1..30}; do
            curl -sf http://localhost:3002/health && break
            sleep 1
          done
      - name: Run k6 smoke test
        run: npm run test:load:smoke
        env:
          BASE_URL: http://localhost:3002
      - name: Upload k6 report
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-report
          path: tests/load/results/
          retention-days: 7
        if: always()

# ──────────────────────────────────────────────
# Job 7: Docker build + push  (main branch only, all gates must pass)
# ──────────────────────────────────────────────
  release:
    name: Docker Release
    runs-on: ubuntu-latest
    needs: [build, openapi-verify, load-test-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/medresearch:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/medresearch:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
