name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.105.155.246
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/medsearch

            # Pull latest image built by CI
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/medresearch:latest

            # Restart only the app containers (keeps postgres/redis data intact)
            docker compose pull web worker
            docker compose up -d --no-deps web worker

            # Wait for health check
            sleep 10
            curl -sf http://localhost:3002/health || (echo "Health check failed" && exit 1)

            echo "Deploy complete"
