name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Run E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install

      - name: Build frontend
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start server, wait, and run E2E tests
        run: |
          node server.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          npx wait-on http://localhost:3002/health --timeout 120000
          npx playwright test tests/e2e/beta-smoke.spec.js tests/e2e/learning-pipeline.spec.js tests/e2e/research-flow.spec.js --project=${{ matrix.browser }}
        env:
          PORT: 3002
          NODE_ENV: e2e
          APP_ROLE: web
          JWT_SECRET: test-jwt-secret-e2e
          ADMIN_TOKEN: test-admin-token-e2e
          BASE_URL: http://localhost:3002
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-tests-mobile:
    name: Mobile E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install

      - name: Build frontend
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start server, wait, and run mobile E2E tests
        run: |
          node server.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          npx wait-on http://localhost:3002/health --timeout 120000
          npx playwright test tests/e2e/beta-smoke.spec.js tests/e2e/learning-pipeline.spec.js tests/e2e/research-flow.spec.js --project='Mobile Chrome'
        env:
          PORT: 3002
          NODE_ENV: e2e
          APP_ROLE: web
          JWT_SECRET: test-jwt-secret-e2e
          ADMIN_TOKEN: test-admin-token-e2e
          BASE_URL: http://localhost:3002
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mobile
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-tests-accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install

      - name: Build frontend
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start server, wait, and run compliance/accessibility tests
        run: |
          node server.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          npx wait-on http://localhost:3002/health --timeout 120000
          npx playwright test tests/e2e/beta-smoke.spec.js --project=chromium --grep "compliance|legal"
        env:
          PORT: 3002
          NODE_ENV: e2e
          APP_ROLE: web
          JWT_SECRET: test-jwt-secret-e2e
          ADMIN_TOKEN: test-admin-token-e2e
          BASE_URL: http://localhost:3002
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-a11y
          path: |
            playwright-report/
            test-results/
          retention-days: 7
