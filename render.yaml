# Render Blueprint — Postgres + Redis + web + worker
# https://render.com/docs/blueprint-spec
#
# Deploy: Dashboard → New Blueprint Instance → connect this repo
# Then set sync:false secrets in the dashboard (JWT_SECRET, API keys).

databases:
  - name: medsearch-postgres
    databaseName: medsearch
    user: medsearch
    plan: starter
    ipAllowList: []

services:
  - type: redis
    name: medsearch-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: medsearch-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ROLE
        value: web
      - key: PORT
        value: 3002
      - key: DEV_DISABLE_AUTH
        value: false
      - key: PGSSL
        value: true
      - key: AUTO_SEED_ON_SEARCH
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: medsearch-postgres
          property: connectionString
      - key: PG_VECTOR_URL
        fromDatabase:
          name: medsearch-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: medsearch-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NCBI_API_KEY
        sync: false
      - key: NCBI_EMAIL
        sync: false

  - type: worker
    name: medsearch-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: node server/worker.js
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ROLE
        value: worker
      - key: WORKER_HEALTH_PORT
        value: 3003
      - key: DEV_DISABLE_AUTH
        value: false
      - key: PGSSL
        value: true
      - key: AUTO_SEED_ON_SEARCH
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: medsearch-postgres
          property: connectionString
      - key: PG_VECTOR_URL
        fromDatabase:
          name: medsearch-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: medsearch-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: medsearch-web
          envVarKey: JWT_SECRET
      - key: GEMINI_API_KEY
        sync: false
      - key: NCBI_API_KEY
        sync: false
      - key: NCBI_EMAIL
        sync: false
      - key: APP_URL
        sync: false
