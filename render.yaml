services:
  - type: web
    name: medical-research-analysis
    runtime: node
    repo: https://github.com/yourusername/medical-research-analysis
    buildCommand: npm install && npm run setup
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: ADMIN_TOKEN
        sync: false
        generateValue: true
    autoDeploy: true
    plan: starter

  # Optional: Python AI Server (for local model inference)
