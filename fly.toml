# Fly.io — web process (add Postgres + Redis via fly postgres/redis, set secrets)
# See docs/WEEK1_DEPLOY.md

app = "medical-research-analysis"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = 10

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  APP_ROLE = "web"
  PORT = "3002"
  DEV_DISABLE_AUTH = "false"
  PGSSL = "true"
  AUTO_SEED_ON_SEARCH = "false"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

# Optional second app or machine for worker:
# fly apps create medical-research-worker
# fly deploy --config fly.worker.toml
