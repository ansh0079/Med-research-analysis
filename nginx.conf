worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting zone: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    server {
        listen 80;
        server_name localhost;

        # Serve built frontend directly from nginx (faster than proxying to Node)
        root <PROJECT_DIR>/dist;
        index index.html;

        # Static assets — long cache, immutable (Vite hashes filenames)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API, health, socket.io → Node.js
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://127.0.0.1:3002;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://127.0.0.1:3002;
            proxy_set_header Host $host;
        }

        # WebSocket support for Socket.io
        location /socket.io/ {
            proxy_pass http://127.0.0.1:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # SPA fallback — any non-file URL returns index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # -------------------------------------------------------
    # HTTPS (uncomment after running mkcert)
    # 1. Install mkcert: https://github.com/FiloSottile/mkcert
    # 2. Run: mkcert localhost 127.0.0.1
    # 3. Move the generated .pem files to the certs/ folder
