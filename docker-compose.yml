# ==========================================
# Production Docker Compose
# Full-stack: Postgres + Redis + Web + Worker
# Usage: docker compose up -d
# ==========================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medsearch-pg
    environment:
      POSTGRES_USER: medsearch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medsearch}
      POSTGRES_DB: medsearch
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - medsearch_pgdata:/var/lib/postgresql/data
      - ./database/pgvector.schema.sql:/docker-entrypoint-initdb.d/10-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medsearch -d medsearch"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: medsearch-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - medsearch_redis:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  grobid:
    image: grobid/grobid:0.8.0
    container_name: medsearch-grobid
    ports:
      - "8070:8070"
    environment:
      - GROBID_OPTS=-Xmx4g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medsearch-web
    ports:
      - "${NODE_PORT:-3002}:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      grobid:
        condition: service_started
    environment:
      - NODE_ENV=production
      - APP_ROLE=web
      - PORT=3002
      # Postgres — auto-detected by DatabaseCore from the URL scheme
      - DATABASE_URL=postgresql://medsearch:${POSTGRES_PASSWORD:-medsearch}@postgres:5432/medsearch
      - PG_VECTOR_URL=postgresql://medsearch:${POSTGRES_PASSWORD:-medsearch}@postgres:5432/medsearch
      - PGSSL=false
      # Redis — enables BullMQ durable job queue + shared rate-limit store
      - REDIS_URL=redis://redis:6379
      # Auth — never disable in production
      - DEV_DISABLE_AUTH=false
      # Secrets (from host .env or CI secrets)
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NCBI_API_KEY=${NCBI_API_KEY}
      - NCBI_EMAIL=${NCBI_EMAIL}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - SEMANTIC_SCHOLAR_KEY=${SEMANTIC_SCHOLAR_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - APP_URL=${APP_URL:-http://localhost:3002}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3002}
      - AUTO_SEED_ON_SEARCH=false
      - PAYWALL_ENABLED=${PAYWALL_ENABLED:-false}
      - GROBID_URL=http://grobid:8070
    volumes:
      - medsearch_data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medsearch-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      grobid:
        condition: service_started
    environment:
      - NODE_ENV=production
      - APP_ROLE=worker
      - WORKER_HEALTH_PORT=3003
      - DATABASE_URL=postgresql://medsearch:${POSTGRES_PASSWORD:-medsearch}@postgres:5432/medsearch
      - PG_VECTOR_URL=postgresql://medsearch:${POSTGRES_PASSWORD:-medsearch}@postgres:5432/medsearch
      - PGSSL=false
      - REDIS_URL=redis://redis:6379
      - DEV_DISABLE_AUTH=false
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NCBI_API_KEY=${NCBI_API_KEY}
      - NCBI_EMAIL=${NCBI_EMAIL}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - APP_URL=${APP_URL:-http://localhost:3002}
      - AUTO_SEED_ON_SEARCH=false
      - GROBID_URL=http://grobid:8070
    command: ["node", "server/worker.js"]
    volumes:
      - medsearch_data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3003/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  medsearch_pgdata:
  medsearch_redis:
  medsearch_data:
