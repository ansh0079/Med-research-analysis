version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medsearch-pg
    environment:
      POSTGRES_USER: medsearch
      POSTGRES_PASSWORD: medsearch
      POSTGRES_DB: medsearch
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - medsearch_pgdata:/var/lib/postgresql/data
      - ./database/pgvector.schema.sql:/docker-entrypoint-initdb.d/10-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medsearch -d medsearch"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  medresearch-app:
    build: .
    container_name: medresearch-prod
    ports:
      - "${NODE_PORT:-3002}:3002"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_PATH=/app/data/app.db
      - PG_VECTOR_URL=postgresql://medsearch:medsearch@postgres:5432/medsearch
      - ENABLE_COLLABORATION_API=${ENABLE_COLLABORATION_API:-false}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      - SEMANTIC_SCHOLAR_KEY=${SEMANTIC_SCHOLAR_KEY}
    volumes:
      - ./data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  medsearch_pgdata: