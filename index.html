<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signal MD — Medical Evidence Intelligence</title>
    <meta name="description" content="Search 100M+ papers across PubMed, Semantic Scholar and OpenAlex. Get AI-synthesised evidence with GRADE ratings in seconds." />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Force-clear stale service worker caches (v3 = current version)
      (function(){
        var V='sw-cache-v3';
        if(localStorage.getItem(V))return;
        if('serviceWorker' in navigator){
          navigator.serviceWorker.getRegistrations().then(function(regs){
            regs.forEach(function(r){r.unregister()});
          });
        }
        if('caches' in window){
          caches.keys().then(function(keys){
            keys.forEach(function(k){caches.delete(k)});
          });
        }
        localStorage.setItem(V,'1');
        setTimeout(function(){location.reload()},200);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
