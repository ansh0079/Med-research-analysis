<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signal MD — Clinical evidence, taught</title>
    <meta name="description" content="Search a clinical topic. Get landmark trials, guidelines, a paper synopsis, and a mentor who can teach it — plus MCQs and case scenarios." />
    <meta name="theme-color" content="#0f3d34" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(){
        try {
          var V='sw-cache-v3';
          if(localStorage.getItem(V))return;
          localStorage.setItem(V,'1');
        } catch(e){ return; }
        var dirty=false;
        if('serviceWorker' in navigator){
          navigator.serviceWorker.getRegistrations().then(function(regs){
            if(regs.length){ dirty=true; regs.forEach(function(r){r.unregister()}); }
          });
        }
        if('caches' in window){
          caches.keys().then(function(keys){
            if(keys.length){ dirty=true; keys.forEach(function(k){caches.delete(k)}); }
          });
        }
        setTimeout(function(){ if(dirty) location.reload(); },300);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
